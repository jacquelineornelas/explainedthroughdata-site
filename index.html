<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explained Through Data</title>
  <meta name="description" content="A 90-day transformation, measured and made visible. A live case study by Jacqueline Ornelas.">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple_touch_icon_180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gelasio:wght@700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --warm-paper: #FAF8F5;
      --deep-navy: #20303A;
      --brass: #B0895E;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--warm-paper);
      color: var(--deep-navy);
      font-family: 'Montserrat', sans-serif;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .hero {
      max-width: 760px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .hero img.logo {
      width: 240px;
      max-width: 70vw;
      height: auto;
      margin-bottom: 48px;
    }
    h1 {
      font-family: 'Gelasio', serif;
      font-weight: 700;
      font-size: clamp(2rem, 5.5vw, 3.25rem);
      line-height: 1.1;
      max-width: 720px;
      margin-bottom: 20px;
    }
    .subline {
      font-size: 1.25rem;
      line-height: 1.5;
      color: rgba(32, 48, 58, 0.75);
      max-width: 600px;
      margin-bottom: 32px;
    }
    .cta {
      display: inline-block;
      background: var(--brass);
      color: var(--warm-paper);
      font-size: 1.125rem;
      font-weight: 500;
      padding: 14px 36px;
      border-radius: 999px;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }
    .cta:hover { background: #C2A06A; }
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.875rem;
      color: rgba(32, 48, 58, 0.5);
    }
    footer a {
      color: inherit;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <img class="logo" src="logo_horizontal_transparent.png" alt="Explained Through Data">
      <h1>A 90-day transformation, measured and made visible.</h1>
      <p class="subline">A live case study in progress, June 7 to September 4, 2026. The full story, with the data, is on its way.</p>
      <a class="cta" href="mailto:ThisIsMe@ExplainedThroughData.com">Get in touch</a>
    </div>
  </main>
  <footer>
    <a href="mailto:jacquelineornelas@explainedthroughdata.com">jacquelineornelas@explainedthroughdata.com</a>
    &nbsp;/&nbsp;
    <a href="https://www.linkedin.com/in/jacquelineornelastx" target="_blank" rel="noopener">linkedin.com/in/jacquelineornelastx</a>
  </footer>
</body>
</html>
